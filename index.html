<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Phone Breaker</title>

<style>

body{
margin:0;
background:#101010;
color:white;
font-family:Arial;
overflow:hidden;
}

#ui{
position:absolute;
left:20px;
top:20px;
width:260px;
background:#1e1e1e;
padding:15px;
border-radius:10px;
}

button{
width:100%;
margin-top:6px;
padding:8px;
border:none;
border-radius:6px;
cursor:pointer;
}

canvas{
position:absolute;
right:0;
top:0;
}

.tab{
display:none;
}

</style>
</head>

<body>

<div id="ui">

<h3>Очки: <span id="points">0</span></h3>
Оружие: <span id="weapon">Палка</span>

<br><br>

<button onclick="openTab('game')">Игра</button>
<button onclick="openTab('shop')">Магазин</button>

<div id="game" class="tab">

<button onclick="upgradeWeapon()">
Улучшить оружие (<span id="weaponCost"></span>)
</button>

</div>

<div id="shop" class="tab">

<h4>Улучшения</h4>

<button onclick="buyUpgrade(2,500)">
+2 за точку (500)
</button>

<button onclick="buyUpgrade(5,2000)">
+5 за точку (2000)
</button>

<button onclick="buyUpgrade(10,5000)">
+10 за точку (5000)
</button>

<h4>Автокликер</h4>

<button onclick="buyAuto(1,500)">1 клик/с (500)</button>
<button onclick="buyAuto(5,2500)">5 кликов/с (2500)</button>
<button onclick="buyAuto(20,10000)">20 кликов/с (10000)</button>

</div>

</div>

<canvas id="gameCanvas" width="900" height="500"></canvas>

<script>

const canvas = document.getElementById("gameCanvas")
const ctx = canvas.getContext("2d")

let points = 0
let bonus = 1
let auto = 0

let weaponLevel = 0

let weapons = [

{n:"Палка",d:1,c:50},
{n:"Камень",d:2,c:150},
{n:"Молоток",d:3,c:400},
{n:"Бита",d:4,c:900},
{n:"Кувалда",d:6,c:2000},
{n:"Дрель",d:8,c:4000},
{n:"Пила",d:10,c:8000},
{n:"Дробовик",d:15,c:15000},
{n:"Ракетница",d:25,c:30000},
{n:"Лазер",d:40,c:60000}

]

let hits = 0
let maxHits = 10

let weak = spawnPoint()

function spawnPoint(){

return{
x:450 + Math.random()*200,
y:150 + Math.random()*200,
r:22
}

}

function drawPhone(){

ctx.fillStyle="#444"
ctx.fillRect(450,120,200,320)

ctx.fillStyle="#00aaff"
ctx.fillRect(465,140,170,260)

if(hits>2) drawCrack()
if(hits>5) drawCrack()
if(hits>8) drawCrack()

}

function drawCrack(){

ctx.strokeStyle="white"

ctx.beginPath()

ctx.moveTo(470+Math.random()*150,150+Math.random()*250)
ctx.lineTo(470+Math.random()*150,150+Math.random()*250)

ctx.stroke()

}

function drawWeak(){

ctx.beginPath()
ctx.arc(weak.x,weak.y,weak.r,0,Math.PI*2)

ctx.fillStyle="red"
ctx.fill()

}

canvas.onclick = e=>{

const rect = canvas.getBoundingClientRect()

const mx = e.clientX-rect.left
const my = e.clientY-rect.top

const dx = mx-weak.x
const dy = my-weak.y

if(Math.sqrt(dx*dx+dy*dy)<weak.r){

hit()

}

}

function hit(){

points += weapons[weaponLevel].d * bonus

hits++

weak = spawnPoint()

if(hits>=maxHits){

setTimeout(resetPhone,300)

}

}

function resetPhone(){

hits=0
weak = spawnPoint()

}

function upgradeWeapon(){

let next = weapons[weaponLevel+1]

if(next && points>=next.c){

points -= next.c
weaponLevel++

}

}

function buyUpgrade(value,cost){

if(points>=cost){

points-=cost
bonus+=value

}

}

function buyAuto(v,c){

if(points>=c){

points-=c
auto+=v

}

}

setInterval(()=>{

for(let i=0;i<auto;i++) hit()

},1000)

function drawUI(){

document.getElementById("points").innerText=Math.floor(points)
document.getElementById("weapon").innerText=weapons[weaponLevel].n

let next = weapons[weaponLevel+1]

document.getElementById("weaponCost").innerText =
next ? next.c : "MAX"

}

function openTab(id){

document.querySelectorAll(".tab").forEach(t=>t.style.display="none")

document.getElementById(id).style.display="block"

}

openTab("game")

function loop(){

ctx.clearRect(0,0,canvas.width,canvas.height)

drawPhone()
drawWeak()
drawUI()

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
