<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Brawl Mobile</title>

<style>

body{
margin:0;
overflow:hidden;
background:#222;
touch-action:none;
}

canvas{
display:block;
margin:auto;
background:#3cb371;
}

#joystick{
position:absolute;
left:40px;
bottom:40px;
width:120px;
height:120px;
background:rgba(255,255,255,0.1);
border-radius:50%;
}

#stick{
position:absolute;
left:40px;
bottom:40px;
width:60px;
height:60px;
background:rgba(255,255,255,0.4);
border-radius:50%;
}

#shoot{
position:absolute;
right:40px;
bottom:60px;
width:90px;
height:90px;
background:rgba(255,0,0,0.6);
border-radius:50%;
}

</style>
</head>

<body>

<canvas id="game" width="900" height="500"></canvas>

<div id="joystick"></div>
<div id="stick"></div>
<div id="shoot"></div>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

let player={
x:200,
y:250,
speed:3
}

let move={x:0,y:0}

let bullets=[]
let enemies=[]
let particles=[]

let walls=[
{x:400,y:100,w:60,h:200},
{x:600,y:250,w:200,h:50}
]

let bushes=[
{x:300,y:300,w:80,h:80},
{x:500,y:50,w:80,h:80}
]

for(let i=0;i<6;i++){

enemies.push({
x:500+Math.random()*300,
y:100+Math.random()*300,
hp:40
})

}

const joystick=document.getElementById("joystick")

joystick.addEventListener("touchmove",e=>{

let t=e.touches[0]

let rect=joystick.getBoundingClientRect()

let x=t.clientX-(rect.left+60)
let y=t.clientY-(rect.top+60)

move.x=x/30
move.y=y/30

})

joystick.addEventListener("touchend",()=>{

move.x=0
move.y=0

})

document.getElementById("shoot").addEventListener("touchstart",shoot)

function shoot(){

let angle=Math.random()*Math.PI*2

bullets.push({

x:player.x,
y:player.y,
vx:Math.cos(angle)*6,
vy:Math.sin(angle)*6

})

playShoot()

}

function playShoot(){

let audio=new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg")

audio.volume=0.2

audio.play()

}

function movePlayer(){

player.x+=move.x
player.y+=move.y

}

function updateBullets(){

bullets.forEach(b=>{

b.x+=b.vx
b.y+=b.vy

})

}

function enemyAI(){

enemies.forEach(e=>{

let dx=player.x-e.x
let dy=player.y-e.y

let dist=Math.sqrt(dx*dx+dy*dy)

if(dist>0){

e.x+=dx/dist*0.6
e.y+=dy/dist*0.6

}

})

}

function collision(){

bullets.forEach(b=>{

enemies.forEach(e=>{

let dx=b.x-e.x
let dy=b.y-e.y

if(Math.sqrt(dx*dx+dy*dy)<15){

e.hp-=20

spawnKill(e.x,e.y)

b.x=-100

}

})

})

enemies=enemies.filter(e=>e.hp>0)

}

function spawnKill(x,y){

for(let i=0;i<15;i++){

particles.push({

x:x,
y:y,
vx:(Math.random()-0.5)*5,
vy:(Math.random()-0.5)*5,
life:30

})

}

}

function updateParticles(){

particles.forEach(p=>{

p.x+=p.vx
p.y+=p.vy
p.life--

})

particles=particles.filter(p=>p.life>0)

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

bushes.forEach(b=>{

ctx.fillStyle="#2e8b57"
ctx.fillRect(b.x,b.y,b.w,b.h)

})

walls.forEach(w=>{

ctx.fillStyle="#555"
ctx.fillRect(w.x,w.y,w.w,w.h)

})

ctx.fillStyle="blue"

ctx.beginPath()
ctx.arc(player.x,player.y,15,0,Math.PI*2)

ctx.fill()

bullets.forEach(b=>{

ctx.fillStyle="yellow"

ctx.fillRect(b.x,b.y,5,5)

})

enemies.forEach(e=>{

ctx.fillStyle="red"

ctx.beginPath()
ctx.arc(e.x,e.y,15,0,Math.PI*2)

ctx.fill()

})

particles.forEach(p=>{

ctx.fillStyle="orange"
ctx.fillRect(p.x,p.y,3,3)

})

}

function loop(){

movePlayer()

enemyAI()

updateBullets()

collision()

updateParticles()

draw()

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
