<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Phone Destroyer</title>

<style>

body{
margin:0;
background:#111;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
}

#ui{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
background:#222;
padding:10px;
border-radius:10px;
}

canvas{
display:block;
margin:auto;
background:#1a1a1a;
}

button{
margin:5px;
padding:8px 15px;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="ui">

Очки: <span id="points">0</span> |
Оружие: <span id="weapon">Палка</span>

<br><br>

<button onclick="upgradeWeapon()">Улучшить оружие</button>

<br>

<button onclick="buyAuto(1,1000)">+1 клик/с (1000)</button>
<button onclick="buyAuto(10,10000)">+10 клик/с (10000)</button>
<button onclick="buyAuto(100,100000)">+100 клик/с (100000)</button>

</div>

<canvas id="game" width="800" height="500"></canvas>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

let points = 0
let weaponLevel = 0
let autoClicks = 0

let weapons = [
{ name:"Палка", damage:1, cost:500 },
{ name:"Молоток", damage:3, cost:2000 },
{ name:"Кувалда", damage:6, cost:7000 },
{ name:"Ракетница", damage:20, cost:30000 }
]

let phoneHP = 30
let maxHP = 30

let broken = false

let weakPoint = spawnPoint()

let particles = []

function spawnPoint(){

return {
x:300 + Math.random()*200,
y:150 + Math.random()*200,
r:15
}

}

function drawPhone(){

if(!broken){

ctx.fillStyle="#333"
ctx.fillRect(300,100,200,300)

ctx.fillStyle="#00aaff"
ctx.fillRect(310,110,180,280)

ctx.fillStyle="white"
ctx.fillText("PHONE",360,90)

}else{

ctx.fillStyle="#333"
ctx.fillRect(300,100,95,300)

ctx.fillRect(405,100,95,300)

}

}

function drawWeakPoint(){

ctx.beginPath()
ctx.arc(weakPoint.x,weakPoint.y,weakPoint.r,0,Math.PI*2)
ctx.fillStyle="red"
ctx.fill()

}

function spawnGlass(){

for(let i=0;i<20;i++){

particles.push({
x:400,
y:250,
vx:(Math.random()-0.5)*8,
vy:(Math.random()-0.5)*8,
life:60
})

}

}

function drawParticles(){

particles.forEach(p=>{

ctx.fillStyle="cyan"
ctx.fillRect(p.x,p.y,3,3)

p.x+=p.vx
p.y+=p.vy
p.life--

})

particles = particles.filter(p=>p.life>0)

}

canvas.addEventListener("click",e=>{

const rect = canvas.getBoundingClientRect()

const mx = e.clientX - rect.left
const my = e.clientY - rect.top

const dx = mx-weakPoint.x
const dy = my-weakPoint.y

if(Math.sqrt(dx*dx+dy*dy)<weakPoint.r){

hit()

}

})

function hit(){

if(broken) return

phoneHP -= weapons[weaponLevel].damage

points += weapons[weaponLevel].damage

weakPoint = spawnPoint()

if(phoneHP <= 0){

broken = true
spawnGlass()

setTimeout(resetPhone,1500)

}

}

function resetPhone(){

phoneHP = maxHP
broken = false
weakPoint = spawnPoint()

}

function upgradeWeapon(){

let w = weapons[weaponLevel]

if(weaponLevel < weapons.length-1 && points >= w.cost){

points -= w.cost
weaponLevel++

}

}

function buyAuto(cps,cost){

if(points >= cost){

points -= cost
autoClicks += cps

}

}

setInterval(()=>{

for(let i=0;i<autoClicks;i++){
hit()
}

},1000)

function drawUI(){

document.getElementById("points").innerText = Math.floor(points)
document.getElementById("weapon").innerText = weapons[weaponLevel].name

}

function loop(){

ctx.clearRect(0,0,canvas.width,canvas.height)

drawPhone()

if(!broken) drawWeakPoint()

drawParticles()

drawUI()

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
