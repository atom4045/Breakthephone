<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mobile Shooter</title>

<style>
body{
margin:0;
overflow:hidden;
touch-action:none;
background:#1e1e1e;
}

canvas{
display:block;
background:#2e8b57;
}

#hpBar{
position:absolute;
top:15px;
left:15px;
width:200px;
height:20px;
background:#444;
}

#hp{
height:100%;
width:100%;
background:lime;
}

#shoot{
position:absolute;
right:40px;
bottom:50px;
width:80px;
height:80px;
border-radius:50%;
background:red;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}
</style>
</head>

<body>

<canvas id="game" width="900" height="500"></canvas>

<div id="hpBar"><div id="hp"></div></div>
<div id="shoot">🔥</div>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let player={
x:450,
y:250,
hp:100
}

let bullets=[]
let enemies=[]
let enemyBullets=[]
let grenades=[]
let explosions=[]

let bushes=[
{x:200,y:150,w:100,h:80},
{x:600,y:300,w:120,h:90}
]

function spawnEnemy(){
let types=["red","green","purple"]
let type=types[Math.floor(Math.random()*3)]

enemies.push({
x:Math.random()*850+25,
y:Math.random()*450+25,
type:type,
cool:0
})
}

setInterval(spawnEnemy,2000)

document.addEventListener("touchmove",e=>{
let t=e.touches[0]
player.x=t.clientX
player.y=t.clientY
})

document.getElementById("shoot").addEventListener("touchstart",shoot)

function shoot(){

bullets.push({
x:player.x,
y:player.y,
vx:8,
vy:0
})

playSound("shoot")

}

function playSound(type){

let url=""

if(type==="shoot")
url="https://actions.google.com/sounds/v1/weapons/laser_shot.ogg"

if(type==="explosion")
url="https://actions.google.com/sounds/v1/explosions/explosion.ogg"

let audio=new Audio(url)
audio.volume=0.3
audio.play()

}

function updateEnemies(){

enemies.forEach(e=>{

let dx=player.x-e.x
let dy=player.y-e.y
let dist=Math.sqrt(dx*dx+dy*dy)

if(dist>0){
e.x+=dx/dist*0.8
e.y+=dy/dist*0.8
}

e.cool--

if(e.cool<=0){

if(e.type==="red"){
shootEnemy(e,4,0.15,6)
}

if(e.type==="green"){
grenades.push({x:e.x,y:e.y,vx:(player.x-e.x)/60,vy:(player.y-e.y)/60})
}

if(e.type==="purple"){
shootEnemy(e,1,0.05,10)
}

e.cool=100

}

})

}

function shootEnemy(e,count,spread,speed){

for(let i=0;i<count;i++){

enemyBullets.push({
x:e.x,
y:e.y,
vx:(Math.random()-0.5)*spread*10,
vy:(Math.random()-0.5)*spread*10
})

}

}

function update(){

bullets.forEach(b=>b.x+=b.vx)
enemyBullets.forEach(b=>{
b.x+=b.vx
b.y+=b.vy
})

grenades.forEach(g=>{
g.x+=g.vx
g.y+=g.vy
})

}

function collisions(){

bullets.forEach(b=>{
enemies.forEach(e=>{
let dx=b.x-e.x
let dy=b.y-e.y
if(Math.sqrt(dx*dx+dy*dy)<15){
e.hp=0
b.x=-999
}
})
})

enemyBullets.forEach(b=>{
let dx=b.x-player.x
let dy=b.y-player.y
if(Math.sqrt(dx*dx+dy*dy)<12){
player.hp-=10
b.x=-999
}
})

grenades.forEach(g=>{
let dx=g.x-player.x
let dy=g.y-player.y
if(Math.sqrt(dx*dx+dy*dy)<20){
player.hp-=20
playSound("explosion")
g.x=-999
}
})

enemies=enemies.filter(e=>e.hp!==0)

}

function draw(){

ctx.clearRect(0,0,900,500)

// кусты
ctx.fillStyle="green"
bushes.forEach(b=>{
ctx.fillRect(b.x,b.y,b.w,b.h)
})

// игрок
ctx.fillStyle="blue"
ctx.beginPath()
ctx.arc(player.x,player.y,15,0,Math.PI*2)
ctx.fill()

// враги
enemies.forEach(e=>{
ctx.fillStyle=e.type==="red"?"red":
e.type==="green"?"lime":"purple"
ctx.beginPath()
ctx.arc(e.x,e.y,14,0,Math.PI*2)
ctx.fill()
})

// пули
ctx.fillStyle="yellow"
bullets.forEach(b=>ctx.fillRect(b.x,b.y,6,3))

ctx.fillStyle="orange"
enemyBullets.forEach(b=>ctx.fillRect(b.x,b.y,5,5))

}

function hpUpdate(){

document.getElementById("hp").style.width=player.hp+"%"

if(player.hp<=0){
alert("Game Over")
location.reload()
}

}

function loop(){
updateEnemies()
update()
collisions()
draw()
hpUpdate()
requestAnimationFrame(loop)
}

loop()

</script>

</body>
</html>
